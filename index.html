<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>wintrack</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('wintrack-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
            /* Set background-color directly so no white flash before CSS loads */
            document.documentElement.style.backgroundColor = 'oklch(0.145 0 0)';
          } else {
            document.documentElement.style.backgroundColor = 'oklch(1 0 0)';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
